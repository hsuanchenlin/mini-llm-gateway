# Mini LLM Gateway — local stack: gateway + Ollama (chat + embeddings) + Qdrant.
#
# Usage:
#   docker compose up --build
#   open http://localhost:8090/
#
# First startup pulls llama3.2:1b (~1.3 GB chat model) and nomic-embed-text
# (~270 MB embedding model) into the ollama-data volume. Subsequent starts
# reuse them.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: mini-llm-gateway-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: mini-llm-gateway-ollama-init
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until OLLAMA_HOST=ollama:11434 ollama list >/dev/null 2>&1; do
          echo "ollama-init: waiting for ollama..."
          sleep 1
        done
        echo "ollama-init: pulling llama3.2:1b (chat) and nomic-embed-text (embeddings)..."
        OLLAMA_HOST=ollama:11434 ollama pull llama3.2:1b
        OLLAMA_HOST=ollama:11434 ollama pull nomic-embed-text
        echo "ollama-init: done."
    restart: "no"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mini-llm-gateway-qdrant
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
    restart: unless-stopped

  gateway:
    build: .
    container_name: mini-llm-gateway
    depends_on:
      ollama:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
    environment:
      GATEWAY_PROVIDERS: fake,ollama
      GATEWAY_DEFAULT_PROVIDER: ollama
      GATEWAY_DEFAULT_MODEL: llama3.2:1b
      OLLAMA_BASE_URL: http://ollama:11434

      # RAG: Ollama-based embeddings + Qdrant vector store.
      GATEWAY_EMBEDDER: ollama
      OLLAMA_EMBED_MODEL: nomic-embed-text
      RAG_VECTOR_STORE: qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: chunks
      RAG_TOP_K: "4"
    ports:
      - "8090:8090"
    volumes:
      - gateway-data:/data
    restart: unless-stopped

volumes:
  ollama-data:
  qdrant-data:
  gateway-data:
