<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini LLM Gateway</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Mini LLM Gateway</h1>
      <div class="controls">
        <label>provider <select id="provider"></select></label>
        <label>model <input id="model" type="text" size="20"></label>
        <label><input type="checkbox" id="stream" checked> stream</label>
        <label><input type="checkbox" id="rag"> RAG</label>
      </div>
    </header>

    <div id="chat" aria-live="polite"></div>

    <div class="input-row">
      <textarea id="input" placeholder="Type a message... (Enter to send, Shift+Enter for newline)"></textarea>
      <div class="input-buttons">
        <button id="send" type="button">Send</button>
        <button id="clear" type="button" class="secondary">Clear</button>
      </div>
    </div>

    <section class="knowledge-section">
      <header class="section-header">
        <h2>Knowledge Base</h2>
        <span id="rag-status" class="muted"></span>
      </header>
      <details id="upload-details">
        <summary>Upload document</summary>
        <div class="upload-form">
          <input id="doc-title" type="text" placeholder="Document title">
          <textarea id="doc-body" placeholder="Paste the document body here..."></textarea>
          <button id="upload" type="button">Upload</button>
        </div>
      </details>
      <table>
        <thead>
          <tr>
            <th>id</th>
            <th>title</th>
            <th>chunks</th>
            <th>uploaded</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="docs-body"></tbody>
      </table>
    </section>

    <section class="cost-section">
      <header class="section-header">
        <h2>Cost</h2>
        <button id="refresh-cost" type="button" class="secondary">Refresh</button>
      </header>
      <div class="cost-summary">
        <div class="cost-card"><div class="cost-label">Today</div><div class="cost-value" id="cost-today">$0.00</div></div>
        <div class="cost-card"><div class="cost-label">All time</div><div class="cost-value" id="cost-total">$0.00</div></div>
      </div>
      <div id="cost-chart"></div>
    </section>

    <section class="log-section">
      <header class="section-header">
        <h2>Request Log</h2>
        <button id="refresh" type="button" class="secondary">Refresh</button>
      </header>
      <div class="log-table-wrap">
        <table>
          <thead>
            <tr>
              <th>time</th>
              <th>provider</th>
              <th>model</th>
              <th>status</th>
              <th>ms</th>
              <th>chars (in/out)</th>
              <th>tokens (in/out)</th>
              <th>rag</th>
              <th>error</th>
            </tr>
          </thead>
          <tbody id="log-body"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
